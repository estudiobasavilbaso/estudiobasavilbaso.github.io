  <text x="600" y="258" font-family="Arial, Helvetica, sans-serif" font-size="20" letter-spacing="6" fill="#C9A84C" text-anchor="middle">ESTUDIO JURÍDICO BASAVILBASO</text>
  <!-- Title -->
  <text x="600" y="350" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#FFFFFF" text-anchor="middle">Hacemos simple</text>
