      <stop offset="0" stop-color="#0D2318"/>
      <stop offset="0.5" stop-color="#152E1F"/>
      <stop offset="1" stop-color="#0A1911"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="-40" r="360" fill="none" stroke="#C9A84C" stroke-opacity="0.07" stroke-width="1.5"/>
  <circle cx="120" cy="560" r="240" fill="none" stroke="#C9A84C" stroke-opacity="0.06" stroke-width="1.5"/>
  <!-- Badge -->
  <circle cx="600" cy="150" r="52" fill="rgba(255,255,255,0.04)" stroke="#C9A84C" stroke-width="2"/>
  <text x="600" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#C9A84C" text-anchor="middle">EB</text>
